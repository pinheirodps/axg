name: AXG CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest --cov=axg --cov-report=term-missing --cov-fail-under=100

  docker:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/axg:latest
            ghcr.io/${{ github.repository_owner }}/axg:${{ github.sha }}

  deploy:
    if: github.event_name == 'push'
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Validate Oracle deploy secrets
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USERNAME: ${{ secrets.ORACLE_USERNAME }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$ORACLE_HOST" ]; then
            echo "::error::Missing required secret: ORACLE_HOST"
            missing=1
          fi
          if [ -z "$ORACLE_USERNAME" ]; then
            echo "::error::Missing required secret: ORACLE_USERNAME"
            missing=1
          fi
          if [ -z "$ORACLE_SSH_KEY" ]; then
            echo "::error::Missing required secret: ORACLE_SSH_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy AXG to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/deployment
            git pull --ff-only || true
            docker compose -f docker-compose.ia.yml pull axg
            docker compose -f docker-compose.ia.yml up -d axg
            docker image prune -f
