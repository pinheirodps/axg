name: AXG CI

on:
  push:
    branches: [ main, master, feature/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[test]
        pip install pytest pytest-asyncio pytest-cov httpx
    - name: Run Core Tests
      run: |
        python -m pytest --cov=axg --cov-report=xml
    - name: Upload Core coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: core

  test-node-sdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd sdks/axg-node-sdk
        npm install
    - name: Build and Test
      run: |
        cd sdks/axg-node-sdk
        npm run build
        npm test

  test-python-sdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install SDK dependencies
      run: |
        cd sdks/axg-python-sdk
        pip install .
        pip install pytest pytest-asyncio
    - name: Run Python SDK Tests
      run: |
        cd sdks/axg-python-sdk
        pytest
