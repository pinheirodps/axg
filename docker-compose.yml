services:
  axg:
    build: .
    ports:
      - "8090:8090"
    environment:
      - AXG_ADMIN_TOKEN=axg-secret-123
      - AXG_PRIVATE_KEY=${AXG_PRIVATE_KEY:-}
    volumes:
      - ./plugins:/app/plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sample Consumer App (Simulating a backend using AXG)
